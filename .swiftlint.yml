# SwiftLint 설정 — ChewChewIOS
#
# 설치·실행:
#   brew install swiftlint
#   swiftlint                 # 레포 루트에서. 경고/에러 목록 출력.
#   swiftlint --fix           # 자동 수정 가능한 규칙만 정리.
#
# CI: lint 스텝에서 `swiftlint --strict`를 쓰면 경고도 실패로 처리한다.
# 기존 거대 파일(AppState 등)은 알려진 부채라 지금은 warning으로만 뜬다 — 리팩터로 줄인다.

included:
  - ChewChewIOS

excluded:
  - Derived                 # tuist 생성물
  - Tuist
  - "**/*.generated.swift"
  - ChewChewIOS/Resources

# 우리 코드 작성 원칙을 강제하는 opt-in 규칙.
opt_in_rules:
  - force_unwrapping          # 강제 언랩 경고 — 크래시 예방("실패를 상태로 드러내라")
  - empty_count               # count == 0 대신 .isEmpty
  - empty_string
  - first_where               # .filter{}.first 대신 .first(where:)
  - last_where
  - contains_over_first_not_nil
  - sorted_first_last
  - toggle_bool
  - redundant_nil_coalescing
  - closure_spacing
  - explicit_init
  - fatal_error_message
  - overridden_super_call
  - prohibited_super_call
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - todo                      # TODO/FIXME는 막지 않는다
  - trailing_comma

# 냄새 감지용 임계값 — README "AppState 경계 규칙"의 300/600/1000 가이드와 맞춘다.
# 파일 크기는 절대 규칙이 아니라 역할 점검 신호다. warning으로 드러내고 error는 넉넉히.
file_length:
  warning: 600
  error: 2000
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 1000

function_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

# 짧지만 관례적인 이름(id, x/y, 색상 r/g/b, 루프 i)은 허용한다.
identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - dx
    - dy
    - r
    - g
    - b
    - i

# try!는 테스트 밖에서 지양 — 경고로.
force_try:
  severity: warning

force_cast:
  severity: warning

reporter: "xcode"
