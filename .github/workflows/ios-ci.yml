name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      # 일부 브랜치의 project.yml은 Config/Secrets.xcconfig를 configFile로 참조한다.
      # 실제 키는 gitignore라 CI 러너엔 파일이 없어 xcodegen validation이 깨진다.
      # 빌드 검증에는 실제 키가 필요 없으니 더미 값으로 stub 파일을 만들어둔다.
      - name: Stub Secrets.xcconfig
        run: |
          mkdir -p Config
          [ -f Config/Secrets.xcconfig ] || echo "INSFORGE_API_KEY = ik_dummy_for_ci_build_only" > Config/Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        env:
          NSUnbufferedIO: YES
        run: |
          set -o pipefail
          xcodebuild \
            -project ChewChewIOS.xcodeproj \
            -scheme ChewChewIOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build \
            | xcbeautify --renderer github-actions
