name: iOS CD - App Store

# vX.Y.Z 형태의 태그를 push하면 Release 아카이브를 만들어 App Store Connect에 심사 제출한다.
# 최종 '출시' 버튼은 사람이 App Store Connect에서 직접 누른다(automatic_release: false).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ios-cd-release
  cancel-in-progress: false

jobs:
  release:
    name: Build & submit to App Store
    runs-on: macos-15
    timeout-minutes: 40

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      GITHUB_RUN_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive app version from tag
        run: |
          # refs/tags/v1.2.3 -> 1.2.3
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Restore Secrets.xcconfig
        env:
          SECRETS_XCCONFIG_BASE64: ${{ secrets.SECRETS_XCCONFIG_BASE64 }}
        run: |
          mkdir -p Config
          echo "$SECRETS_XCCONFIG_BASE64" | base64 --decode > Config/Secrets.xcconfig

      - name: Restore GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ChewChewIOS/GoogleService-Info.plist
          else
            echo "GoogleService-Info.plist secret 미설정 - Firebase 비활성으로 빌드"
          fi

      - name: Setup Ruby & fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Tuist
        run: |
          TUIST_VERSION=4.200.5
          curl -L "https://github.com/tuist/tuist/releases/download/${TUIST_VERSION}/tuist.zip" -o /tmp/tuist.zip
          rm -rf /tmp/tuist
          unzip -q /tmp/tuist.zip -d /tmp/tuist
          echo "/tmp/tuist" >> "$GITHUB_PATH"

      - name: Generate Xcode workspace
        run: tuist generate --no-open

      - name: Submit to App Store
        run: bundle exec fastlane release
