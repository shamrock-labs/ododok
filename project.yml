name: ChewChewIOS
options:
  bundleIdPrefix: com.shamrock
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 26SRR6SP9B

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  KakaoOpenSDK:
    url: https://github.com/kakao/kakao-ios-sdk
    from: "2.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  Amplitude:
    url: https://github.com/amplitude/Amplitude-Swift
    from: "1.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"

targets:
  ChewChewIOS:
    type: application
    platform: iOS
    sources:
      - ChewChewIOS
    dependencies:
      - target: OdodokWidgets
        embed: true
      - target: OdodokNotificationContent
        embed: true
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: KakaoOpenSDK
        product: KakaoSDKCommon
      - package: KakaoOpenSDK
        product: KakaoSDKAuth
      - package: KakaoOpenSDK
        product: KakaoSDKUser
      - package: KakaoOpenSDK
        product: KakaoSDKShare
      - package: KakaoOpenSDK
        product: KakaoSDKTemplate
      - package: Sentry
        product: Sentry
      - package: Amplitude
        product: AmplitudeSwift
      - package: Firebase
        product: FirebaseAnalytics
    postBuildScripts:
      # Release 아카이브 시 dSYM을 Sentry로 업로드해 크래시 스택을 심볼화한다(ODO-78).
      # Release + 토큰 설정 + sentry-cli 설치가 모두 충족될 때만 실행, 그 외(Debug·시뮬레이터·CI·미설정)는 조용히 skip.
      # 토큰은 Info.plist로 가지 않고 빌드 시점 환경변수로만 쓰여 번들에 실리지 않는다(Secrets.xcconfig 빌드 설정).
      - name: Upload dSYMs to Sentry
        basedOnDependencyAnalysis: false
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then echo "dSYM upload: skip (not Release)"; exit 0; fi
          # token·org·project가 모두 채워졌고 placeholder가 아닐 때만 업로드한다. 하나라도 비었거나
          # REPLACE 상태면 조용히 skip — token만 채워진 부분 설정으로 sentry-cli가 실패해
          # Release 빌드 페이즈가 깨지는 것을 막는다(isUsableSecret과 같은 *REPLACE* 가드).
          for v in "${SENTRY_AUTH_TOKEN}" "${SENTRY_ORG}" "${SENTRY_PROJECT}"; do
            case "$v" in ""|*REPLACE*) echo "dSYM upload: skip (Sentry token/org/project 미설정)"; exit 0;; esac
          done
          if ! command -v sentry-cli >/dev/null 2>&1; then
            echo "warning: sentry-cli 미설치 — dSYM 업로드 생략. 설치: brew install getsentry/tools/sentry-cli"; exit 0
          fi
          sentry-cli debug-files upload \
            --auth-token "${SENTRY_AUTH_TOKEN}" \
            --org "${SENTRY_ORG}" \
            --project "${SENTRY_PROJECT}" \
            "${DWARF_DSYM_FOLDER_PATH}"
    # 엔타이틀먼트(Sign in with Apple, APNs 푸시). ODO-16: 유료 Apple Developer 계정 등록 완료로 활성화.
    # 비활성 시엔 앱이 registerForRemoteNotifications 실패를 받아 로컬 알림으로 폴백했다(MealPushCoordinator).
    # Debug는 APNs sandbox, Release/TestFlight/App Store는 APNs production으로 빌드 설정에서 분리한다.
    entitlements:
      path: ChewChewIOS/ChewChewIOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: $(APS_ENVIRONMENT)
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: ChewChewIOS/Info.plist
      properties:
        CFBundleDisplayName: Ododok
        InsForgeAPIKey: "$(INSFORGE_API_KEY)"
        SentryDSN: "$(SENTRY_DSN)"
        AmplitudeAPIKey: "$(AMPLITUDE_API_KEY)"
        BackendBaseURL: "$(BACKEND_BASE_URL)"
        KakaoInviteMobileWebURL: "$(KAKAO_INVITE_MOBILE_WEB_URL)"
        # Spring staging(HTTP, Tailscale 내부 IP) 연결용 ATS 예외.
        # InsForge(HTTPS)는 영향 없음. staging이 HTTPS 도메인을 갖게 되면 제거.
        NSAppTransportSecurity:
          NSExceptionDomains:
            "100.99.252.124":
              NSExceptionAllowsInsecureHTTPLoads: true
        NSMotionUsageDescription: 식사 중 AirPods 움직임을 분석해 저작 리듬을 시각화합니다.
        NSMicrophoneUsageDescription: AirPods IMU 동작 신뢰성 분석을 위해 마이크 권한이 필요할 수 있어요. 음성 녹음은 하지 않습니다.
        UIBackgroundModes:
          - audio
        UIAppFonts:
          - Pretendard-Regular.otf
          - Pretendard-Medium.otf
          - Pretendard-SemiBold.otf
          - Pretendard-Bold.otf
          - Pretendard-Black.otf
        GIDClientID: "$(GOOGLE_CLIENT_ID)"
        KakaoNativeAppKey: "$(KAKAO_NATIVE_APP_KEY)"
        LSApplicationQueriesSchemes:
          - kakaokompassauth
          - kakaotalk
          - kakaolink
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - chewchew
          - CFBundleURLSchemes:
              - "$(GOOGLE_REVERSED_CLIENT_ID)"
          - CFBundleURLSchemes:
              - "kakao$(KAKAO_NATIVE_APP_KEY)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ODODOK_BUNDLE_PREFIX).ododok
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      # 백엔드 base URL은 빌드 컨피그별로 분리 → Info.plist(BackendBaseURL)로 주입(Swift 하드코딩 안 함).
      # Debug=dev/staging(Tailscale Funnel 공개주소, 폰이 Tailscale 없이 일반 인터넷으로 도달) / Release=prod.
      # 여기(project.yml=YAML)에 두는 이유: xcconfig는 //를 주석으로 봐서 https:// 가 잘림. YAML은 안전.
      configs:
        Debug:
          APS_ENVIRONMENT: development
          BACKEND_BASE_URL: https://sungho-macmini.tail502d5f.ts.net
        Release:
          APS_ENVIRONMENT: production
          BACKEND_BASE_URL: https://api.ododok.cloud

  OdodokWidgets:
    type: app-extension
    platform: iOS
    sources:
      - OdodokWidgets
      - path: ChewChewIOS/Models/MealActivityAttributes.swift
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: OdodokWidgets/Info.plist
      properties:
        CFBundleDisplayName: 오도독
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ODODOK_BUNDLE_PREFIX).ododok.OdodokWidgets
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  OdodokNotificationContent:
    type: app-extension
    platform: iOS
    sources:
      - OdodokNotificationContent
      - OdodokWidgets/Assets.xcassets
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: OdodokNotificationContent/Info.plist
      properties:
        CFBundleDisplayName: 오도독
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.content-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationViewController
          NSExtensionAttributes:
            UNNotificationExtensionCategory:
              - MEAL_REMINDER
              - MEAL_INTERRUPTION
            UNNotificationExtensionDefaultContentHidden: true
            UNNotificationExtensionInitialContentSizeRatio: 0.56
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ODODOK_BUNDLE_PREFIX).ododok.OdodokNotificationContent
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        APPLICATION_EXTENSION_API_ONLY: YES

  ChewChewIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ChewChewIOSTests
    dependencies:
      - target: ChewChewIOS
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ChewChewIOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ChewChewIOS"
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  ChewChewIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ChewChewIOSUITests
    dependencies:
      - target: ChewChewIOS
    settings:
      base:
        TEST_TARGET_NAME: ChewChewIOS
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

# 앱 스킴을 명시적으로 정의해 항상 shared 스킴(xcshareddata)으로 생성한다.
# 위젯 익스텐션은 단독 실행이 안 되므로(Run 시 SpringBoard 에러) 앱 스킴만 둔다.
# xcodegen 재생성·Xcode 재오픈에도 ChewChewIOS 스킴이 안정적으로 보이게 하기 위함.
schemes:
  ChewChewIOS:
    build:
      targets:
        ChewChewIOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChewChewIOSTests
        - ChewChewIOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
