name: ChewChewIOS
options:
  bundleIdPrefix: com.sungho
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  ChewChewIOS:
    type: application
    platform: iOS
    sources:
      - ChewChewIOS
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: ChewChewIOS/Info.plist
      properties:
        CFBundleDisplayName: ChewChew
        InsForgeAPIKey: "$(INSFORGE_API_KEY)"
        NSMotionUsageDescription: 식사 중 AirPods 움직임을 분석해 저작 리듬을 시각화합니다.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sungho.chewchewios
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
